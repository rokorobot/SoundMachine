name: CI

# H1 verification: backend and frontend are checked independently on every
# pull request into main and on pushes to main. No deployment or release steps.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install test runners
        # pytest and httpx (used by fastapi.testclient) are required to run the
        # suite but are not part of the runtime dependency file; install them
        # explicitly here rather than modifying requirements.txt.
        run: pip install pytest httpx

      - name: Run backend test suite
        # Force DB resolution onto a disposable, runner-local absolute path so the
        # suite can never touch a developer's live database. The runner context is
        # only available at step scope, not in job-level env. Defense in depth: the
        # live DB is gitignored and absent on the runner.
        env:
          SOUND_MACHINA_DB: ${{ runner.temp }}/ci_sound_machina.db
        run: python -m pytest

  frontend:
    name: Frontend (vitest, build, lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean, lockfile-preserving)
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Lint
        run: npm run lint
